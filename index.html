<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Instagram Growth Checklist — Social Runway</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f9f1ff; min-height: 100vh; color: #2a1a33; }
    .hero { background: linear-gradient(150deg, #2a1a33 0%, #4a1a5e 60%, #6b2080 100%); padding: 48px 24px 64px; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,73,193,0.18) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    .hero::after { content: ''; position: absolute; bottom: -30px; left: -30px; width: 160px; height: 160px; background: radial-gradient(circle, rgba(232,206,254,0.12) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
    .hero-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(232,206,254,0.7); margin-bottom: 16px; }
    .hero-title { font-family: 'Playfair Display', serif; font-weight: 800; font-size: clamp(28px, 6vw, 48px); color: #f9f1ff; line-height: 1.15; margin-bottom: 6px; }
    .hero-accent { font-style: italic; color: #ff49c1; display: block; }
    .hero-sub { font-size: 15px; color: rgba(249,241,255,0.8); margin-top: 14px; line-height: 1.65; max-width: 460px; margin-left: auto; margin-right: auto; }
    .prog-wrap { max-width: 620px; margin: -28px auto 0; padding: 0 20px; position: relative; z-index: 2; }
    .prog-card { background: #2a1a33; border-radius: 16px; padding: 24px 28px; box-shadow: 0 8px 32px rgba(42,26,51,0.18); }
    .prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .prog-lbl { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(232,206,254,0.5); }
    .prog-num { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: #ff49c1; }
    .prog-bg { width: 100%; height: 6px; background: rgba(232,206,254,0.12); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #ff49c1, #ffcefd); border-radius: 3px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .intro { max-width: 620px; margin: 0 auto; padding: 36px 20px 0; text-align: center; font-size: 15px; line-height: 1.75; color: #5a3a6e; }
    .engage-note { max-width: 620px; margin: 24px auto 0; padding: 0 20px; }
    .engage-card { background: rgba(255,73,193,0.07); border-left: 3px solid #ff49c1; border-radius: 0 10px 10px 0; padding: 14px 18px; }
    .engage-card p { font-size: 13.5px; line-height: 1.65; color: #5a3a6e; }
    .engage-card strong { color: #ff49c1; font-weight: 700; }
    .cta-btn { display: inline-flex; align-items: center; gap: 8px; background: #ff49c1; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; margin-top: 24px; text-decoration: none; letter-spacing: 0.3px; transition: all 0.2s ease; }
    .cta-btn:hover { background: #d4009a; transform: translateY(-2px); }
    .section { max-width: 620px; margin: 44px auto 0; padding: 0 20px; }
    .sec-hd { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 24px; }
    .sec-num { width: 38px; height: 38px; min-width: 38px; border-radius: 50%; background: rgba(255,73,193,0.12); display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: #ff49c1; margin-top: 2px; }
    .sec-sublbl { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #b890d0; margin-bottom: 3px; }
    .sec-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(20px, 4vw, 26px); color: #2a1a33; line-height: 1.2; }
    .sec-title em { font-style: italic; color: #ff49c1; }
    .item { display: flex; gap: 14px; padding: 18px 0; border-bottom: 1px solid rgba(255,73,193,0.1); cursor: pointer; transition: all 0.2s ease; }
    .item:hover { padding-left: 4px; }
    .item:last-child { border-bottom: none; }
    .check { width: 26px; height: 26px; min-width: 26px; border-radius: 50%; border: 2px solid #e8cefe; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.3s ease; background: transparent; }
    .check.on { border-color: #ff49c1; background: #ff49c1; }
    .check svg { opacity: 0; transform: scale(0.5); transition: all 0.25s ease; }
    .check.on svg { opacity: 1; transform: scale(1); }
    .item-body { flex: 1; }
    .item-title { font-weight: 700; font-size: 15px; color: #2a1a33; line-height: 1.4; margin-bottom: 5px; transition: color 0.2s ease; }
    .item-title.done { color: #b890d0; text-decoration: line-through; text-decoration-color: rgba(184,144,208,0.4); }
    .item-desc { font-size: 13.5px; line-height: 1.65; color: #7a5590; }
    .time-tag { display: inline-flex; align-items: center; font-family: 'Space Mono', monospace; font-size: 9px; color: #ff49c1; background: rgba(255,73,193,0.1); padding: 3px 8px; border-radius: 20px; margin-bottom: 6px; letter-spacing: 0.5px; }
    .optional-tag { display: inline-flex; align-items: center; font-family: 'Space Mono', monospace; font-size: 9px; color: #9060b0; background: rgba(144,96,176,0.1); padding: 3px 8px; border-radius: 20px; margin-bottom: 6px; margin-left: 4px; letter-spacing: 0.5px; }
    .cta-section { max-width: 620px; margin: 56px auto 0; padding: 0 20px; }
    .cta-card { background: linear-gradient(135deg, #2a1a33 0%, #4a1a5e 100%); border-radius: 20px; padding: 44px 36px; text-align: center; position: relative; overflow: hidden; }
    .cta-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(255,73,193,0.15) 0%, transparent 70%); border-radius: 50%; }
    .cta-card::after { content: ''; position: absolute; bottom: -20px; left: -20px; width: 130px; height: 130px; background: radial-gradient(circle, rgba(255,206,253,0.1) 0%, transparent 70%); border-radius: 50%; }
    .cta-emoji { font-size: 32px; margin-bottom: 12px; }
    .cta-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 22px; color: #f9f1ff; margin-bottom: 10px; position: relative; z-index: 1; }
    .cta-title em { font-style: italic; color: #ff49c1; }
    .cta-body { font-size: 14px; line-height: 1.7; color: rgba(249,241,255,0.65); max-width: 420px; margin: 0 auto 6px; position: relative; z-index: 1; }
    .cta-features { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 18px auto; max-width: 440px; position: relative; z-index: 1; }
    .cta-feat { font-size: 12.5px; color: rgba(249,241,255,0.75); background: rgba(255,73,193,0.12); border: 1px solid rgba(255,73,193,0.2); padding: 5px 12px; border-radius: 20px; }
    .done-card { max-width: 620px; margin: 44px auto 0; padding: 0 20px 72px; }
    .done-inner { background: #e8cefe; border-radius: 20px; padding: 40px 32px; text-align: center; }
    .done-icon { font-size: 36px; margin-bottom: 12px; }
    .done-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 21px; color: #2a1a33; margin-bottom: 8px; }
    .done-text { font-size: 14px; line-height: 1.7; color: #5a3a6e; max-width: 400px; margin: 0 auto; }
    .reset-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(42,26,51,0.1); color: #5a3a6e; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 12px; padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(42,26,51,0.15); cursor: pointer; margin-top: 18px; transition: all 0.2s ease; }
    .reset-btn:hover { background: rgba(42,26,51,0.18); }
    .footer { background: #2a1a33; padding: 40px 24px; text-align: center; margin-top: 0; }
    .footer-brand { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #f9f1ff; margin-bottom: 4px; }
    .footer-tag { font-size: 12px; color: rgba(232,206,254,0.5); margin-bottom: 20px; font-style: italic; }
    .footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
    .footer-link { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: rgba(232,206,254,0.35); text-decoration: none; }
    .footer-link:hover { color: #ff49c1; }
    .footer-credit { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(232,206,254,0.2); margin-top: 16px; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
  const data = {
    label: "SOCIAL RUNWAY",
    title: "Daily Instagram",
    titleAccent: "Growth Checklist",
    subtitle: "Your simple daily routine to build a tight-knit Instagram community, activate the algorithm and attract perfect-fit followers without spending all day on Instagram.",
    cta: { text: "Join The Social Playground", url: "https://www.instaslay.com" },
    sections: [
      {
        sublabel: "WARM UP THE ALGORITHM",
        title: "Before You Post",
        time: "10 mins",
        items: [
          { title: "Hype your upcoming post on Stories", desc: "A couple of hours before posting, tease your content on Stories. Use a poll sticker with a question related to your post. This primes your audience and tells Instagram people are already interested.", time: "2 MIN" },
          { title: "Leave a genuine comment on 10 large creator accounts in your niche", desc: "Make it a valuable, high quality comment that acts like a billboard for your business. Their audience is likely your ideal client too, so a great comment drives their followers to want to check out your profile.", time: "5 MIN" },
          { title: "Respond to Stories from those same 10 accounts", desc: "Story replies land in DMs which signals a real connection to Instagram. This is how you start conversations that turn strangers into community members.", time: "2 MIN" },
          { title: "Leave a genuine comment on 5 niche accounts from the Explore page", desc: "Commenting on niche specific accounts from the Explore page helps train the algorithm to push your content out to their followers. It also acts as a billboard for your business driving more profile visits from people who are already interested in your space.", time: "1 MIN" },
          { title: "Leave a genuine comment on your 5 to 10 newest followers' posts", desc: "Head to your followers list and engage with the most recent people who followed you. A thoughtful comment shows you noticed them and turns a new follow into a genuine fan.", time: "Optional", optional: true }
        ]
      },
      {
        sublabel: "TURN FOLLOWERS INTO A REAL COMMUNITY",
        title: "After You Post",
        time: "20 to 30 mins",
        items: [
          { title: "Share your post to Stories in a fun, engaging way", desc: "Don't just tap Add to Story. Use a sticker like a question box, poll or slider to invite interaction. This drives views back to your post and signals to Instagram your content is worth spreading.", time: "2 MIN" },
          { title: "Go back to your previous post, like comments and reply to any you missed", desc: "Like every comment to get their attention and pull them across to your new post, then reply to any comments you didn't get a chance to respond to when you first posted. No comment left behind because every reply deepens the relationship and keeps the conversation alive.", time: "3 MIN" },
          { title: "Leave 10 genuine comments on posts in your Following feed", desc: "These people have most recently posted which means they are likely online right now and far more likely to reciprocate your engagement. Scroll your Following feed and leave a real comment on the first 10 posts that come up. This keeps you visible to people who already know and trust you.", time: "5 MIN" },
          { title: "Pin a simple question in your new post's comments", desc: "Ask something fun and easy to answer. Make it so irresistible people can't help but reply. Pin it to the top. This sparks a comment thread that signals strong engagement to Instagram from the moment you post.", time: "2 MIN" },
          { title: "Genuinely reply to every comment on your new post", desc: "Don't like comments and move on. Save the likes for next time when you come back to this post. Right now write a real reply to every single comment, ask a follow up question, add something personal and keep the conversation going. Every genuine reply tells Instagram your post is worth showing to more people.", time: "5 MIN" },
          { title: "Leave a genuine comment on the last post of everyone who commented on your previous post", desc: "Go to the people who commented on your last post and leave a real comment on their content. It shows you appreciate their support and that you genuinely support them too. This increases the chances they will keep engaging with your future posts because they know you have their back and that they are not just a follower number to you.", time: "5 MIN" },
          { title: "Leave genuine comments on your target audience in other niche accounts", desc: "Find posts in your niche from the last hour and join the conversations happening there. These people are your perfect-fit followers actively looking for content just like yours.", time: "5 MIN" }
        ]
      },
      {
        sublabel: "STAY VISIBLE",
        title: "Bonus Throughout the Day",
        time: "10 mins",
        items: [
          { title: "Turn on post notifications for 15 large accounts and be first to comment", desc: "Being one of the first to leave a genuine comment on a big post dramatically increases your chance of being pinned. This puts you in front of thousands of perfect-fit followers for free and most people completely sleep on this strategy.", time: "ONGOING" },
          { title: "Leave genuine comments on pinned replies of large niche account posts", desc: "Pinned comments on popular posts get serious eyeballs. Jump into those conversations with something valuable and watch new profile visitors roll in.", time: "3 MIN" },
          { title: "Reply to all your DMs", desc: "Every DM is a potential fan-to-client moment. Keep the conversation warm. Community isn't just built in the feed, it's built in the DMs.", time: "5 MIN" },
          { title: "Save content ideas that inspire you to your content bank", desc: "When something stops your scroll, save it and note why it worked. Your best future posts come from understanding what you can't help but engage with yourself.", time: "2 MIN" }
        ]
      }
    ]
  };

  const totalItems = data.sections.reduce((sum, s) => sum + s.items.length, 0);
  let checked = {};

  function toggle(key) { checked[key] = !checked[key]; render(); }
  function reset() { checked = {}; render(); }

  function render() {
    const count = Object.values(checked).filter(Boolean).length;
    const pct = Math.round((count / totalItems) * 100);
    const allDone = count === totalItems;

    let html = `
      <div class="hero">
        <div class="hero-label">${data.label}</div>
        <div class="hero-title">${data.title}<span class="hero-accent">${data.titleAccent}</span></div>
        <div class="hero-sub">${data.subtitle}</div>
      </div>
      <div class="prog-wrap">
        <div class="prog-card">
          <div class="prog-top">
            <span class="prog-lbl">YOUR DAILY PROGRESS</span>
            <span class="prog-num">${count} / ${totalItems} done</span>
          </div>
          <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
      <div class="intro">
        <p>Growing on Instagram doesn't have to feel overwhelming or take over your life. This checklist gives you a focused daily routine rooted in community first that activates the algorithm, attracts perfect-fit followers, and turns them into fans and eventually clients. Work through it once a day when you post and watch the momentum build.</p>
      </div>
      <div class="engage-note">
        <div class="engage-card">
          <p><strong>A quick note:</strong> Throughout this checklist, engaging always means leaving a <strong>genuine, meaningful comment.</strong> Not a like, not an emoji, not a one-word reply. A real comment that shows your personality and adds actual value. That's what builds community.</p>
        </div>
      </div>
    `;

    data.sections.forEach((sec, si) => {
      html += `
        <div class="section">
          <div class="sec-hd">
            <div class="sec-num">${String(si+1).padStart(2,'0')}</div>
            <div>
              <div class="sec-sublbl">${sec.sublabel} &nbsp;·&nbsp; ${sec.time}</div>
              <div class="sec-title">${sec.title}</div>
            </div>
          </div>
      `;
      sec.items.forEach((item, ii) => {
        const key = `${si}-${ii}`;
        const on = checked[key] ? 'on' : '';
        const done = checked[key] ? 'done' : '';
        html += `
          <div class="item" onclick="toggle('${key}')">
            <div class="check ${on}">
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-body">
              <div><span class="time-tag">${item.time}</span>${item.optional ? '<span class="optional-tag">OPTIONAL</span>' : ''}</div>
              <div class="item-title ${done}">${item.title}</div>
              <div class="item-desc">${item.desc}</div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    html += `
      <div class="cta-section">
        <div class="cta-card">
          <div class="cta-emoji">🎉</div>
          <div class="cta-title">It's time to inject the FUN back into <em>socials</em></div>
          <div class="cta-body">Ditch the post-and-pray strategy, stop attracting randoms, and go from the internet's best-kept secret to wildly in-demand. I grew from 0 to 50K followers organically and inside The Social Playground I'm teaching you exactly how I did this.</div>
          <div class="cta-features">
            <span class="cta-feat">💖 InstaSlay IG growth course</span>
            <span class="cta-feat">✨ Custom GPTs</span>
            <span class="cta-feat">📅 Weekly content plans</span>
            <span class="cta-feat">🎤 Weekly Q&As</span>
            <span class="cta-feat">🔍 Monthly content reviews</span>
          </div>
          <div class="cta-body" style="margin-bottom:0">Post. Play. Profit. Repeat. 🙌</div>
          <a href="${data.cta.url}" class="cta-btn" style="margin-top:24px;position:relative;z-index:1">${data.cta.text} →</a>
        </div>
      </div>
      <div class="done-card">
        <div class="done-inner">
          <div class="done-icon">${allDone ? '🎉' : '✨'}</div>
          <div class="done-title">${allDone ? "You showed up for your community today." : "Keep going, your community is waiting."}</div>
          <div class="done-text">${allDone
            ? "That's the whole checklist done. You didn't just post today. You built real relationships, activated the algorithm, and moved closer to a community full of perfect-fit followers. See you tomorrow."
            : "Every action you take here is a signal to Instagram and to the people who are about to discover you. Community first, always."
          }</div>
          <br/>
          <button class="reset-btn" onclick="reset()">↺ Reset for tomorrow</button>
        </div>
      </div>
      <div class="footer">
        <div class="footer-brand">Social Runway</div>
        <div class="footer-tag">by Tara · where socials become easy-peazy-lemon-squeezy</div>
        <div class="footer-links">
          <a href="#" class="footer-link">Privacy Policy</a>
          <a href="#" class="footer-link">Terms of Service</a>
          <a href="#" class="footer-link">Contact</a>
        </div>
        <div class="footer-credit">Daily Instagram Growth Checklist · Social Runway</div>
      </div>
    `;

    document.getElementById('app').innerHTML = html;
  }

  render();
</script>
</body>
</html>
